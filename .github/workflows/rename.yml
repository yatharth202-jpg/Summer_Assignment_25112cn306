name: Rename Folders

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rename folders
        run: |
          for d in */ ; do
            name="${d%/}"

            if [[ "$name" =~ ^([0-9]+)-(.*)$ ]]; then
              num=${BASH_REMATCH[1]}
              rest=${BASH_REMATCH[2]}
              new=$(printf "%04d-%s" "$num" "$rest")
              [ "$name" != "$new" ] && mv "$name" "$new"
            fi

            if [[ "$name" =~ ^Day([0-9]+)$ ]]; then
              num=${BASH_REMATCH[1]}
              new=$(printf "Day%02d" "$num")
              [ "$name" != "$new" ] && mv "$name" "$new"
            fi
          done

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto rename folders"
          git push
